<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neexup — Historique des ventes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="nav.js" defer></script>
  <script src="utils.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.light-theme {
      --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9;
      --border: rgba(0,0,0,0.08);
      --text: #0f172a; --text-muted: #64748b; --text-dim: #94a3b8;
    }
    :root {
      --bg: #060910; --bg2: #0a0e1a; --bg3: #0f1525;
      --border: rgba(255,255,255,0.07);
      --blue: #0066ff; --cyan: #00d4ff;
      --blue-dim: rgba(0,102,255,0.12); --glow-blue: rgba(0,102,255,0.25);
      --text: #eef2ff; --text-muted: #7a8399; --text-dim: #3d4560;
      --success: #00d4a0; --warning: #f59e0b; --danger: #ff4d6a;
      --sidebar: 240px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; }

    .sidebar { width: var(--sidebar); flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 1rem; height: 100vh; position: fixed; left: 0; top: 0; z-index: 50; overflow: hidden; }
    .sidebar-logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; background: linear-gradient(90deg, #fff 0%, var(--cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 0.5rem 0.75rem; margin-bottom: 2rem; text-decoration: none; display: block; white-space: nowrap; }
    .nav-section { margin-bottom: 1.5rem; }
    .nav-label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; padding: 0 0.75rem; margin-bottom: 0.5rem; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: 'Inter', sans-serif; white-space: nowrap; overflow: hidden; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: var(--blue-dim); color: #3385ff; }
    .nav-item .icon { width: 18px; text-align: center; font-size: 1rem; flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; overflow: hidden; }
    .user-av { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--cyan)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: white; flex-shrink: 0; }
    .user-name { font-size: 0.85rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-role { font-size: 0.72rem; color: var(--text-muted); }
    .btn-logout { width: 100%; margin-top: 0.5rem; padding: 9px; border-radius: 9px; background: rgba(255,77,106,0.08); border: 1px solid rgba(255,77,106,0.15); color: var(--danger); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }

    .main { margin-left: var(--sidebar); flex: 1; height: 100vh; overflow-y: auto; padding: 2rem 2.5rem; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .topbar h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .topbar p { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }

    .toolbar { display: flex; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap input { width: 100%; padding: 10px 16px 10px 40px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.875rem; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; }
    .search-wrap input:focus { border-color: var(--blue); }
    .search-wrap input::placeholder { color: var(--text-dim); }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
    .filter-select { padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.875rem; font-family: 'Inter', sans-serif; outline: none; }

    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .table-header { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 100px; gap: 1rem; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
    .table-header span { font-size: 0.72rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .table-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 100px; gap: 1rem; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.2s; cursor: pointer; }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: var(--bg3); }
    .receipt-num { font-size: 0.82rem; font-weight: 700; font-family: monospace; color: var(--cyan); }
    .sale-date { font-size: 0.82rem; color: var(--text-muted); }
    .sale-client { font-size: 0.85rem; font-weight: 500; }
    .sale-amount { font-size: 0.9rem; font-weight: 800; color: var(--success); }
    .pay-badge { font-size: 0.72rem; padding: 3px 10px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border); color: var(--text-muted); display: inline-block; }
    .btn-view { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .btn-view:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

    /* TICKET MODAL */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 200; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }

    /* TICKET STYLE PAPIER */
    .ticket {
      background: #fff;
      color: #111;
      width: 320px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 8px;
      padding: 1.5rem 1.25rem;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      position: relative;
    }
    .ticket-top { text-align: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px dashed #ccc; }
    .ticket-logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.03em; color: #111; }
    .ticket-store { font-size: 0.78rem; color: #555; margin-top: 3px; }
    .ticket-date { font-size: 0.75rem; color: #888; margin-top: 6px; }
    .ticket-receipt { font-size: 0.78rem; font-weight: 700; margin-top: 4px; color: #333; }
    .ticket-section { margin: 0.75rem 0; }
    .ticket-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .ticket-row .item-name { flex: 1; padding-right: 8px; }
    .ticket-row .item-qty { color: #555; white-space: nowrap; }
    .ticket-row .item-price { font-weight: 700; white-space: nowrap; text-align: right; min-width: 70px; }
    .ticket-divider { border: none; border-top: 1px dashed #ccc; margin: 0.75rem 0; }
    .ticket-total-row { display: flex; justify-content: space-between; font-weight: 900; font-size: 1rem; }
    .ticket-sub-row { display: flex; justify-content: space-between; color: #555; font-size: 0.78rem; margin-bottom: 3px; }
    .ticket-footer { text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed #ccc; color: #888; font-size: 0.75rem; }
    .ticket-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .btn-print { flex: 1; padding: 10px; border-radius: 8px; background: #111; color: white; border: none; font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-close-ticket { flex: 1; padding: 10px; border-radius: 8px; background: transparent; color: #666; border: 1px solid #ddd; font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }

    @media print {
      body * { visibility: hidden; }
      .ticket, .ticket * { visibility: visible; }
      .ticket { position: fixed; top: 0; left: 0; width: 80mm; }
      .ticket-actions { display: none; }
    }
  </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-SSLQ131CD1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-SSLQ131CD1');
</script>
</head>
<body>

<aside class="sidebar" id="app-sidebar"></aside>

<main class="main">
  <div class="topbar">
    <div><h1>Historique des ventes</h1><p id="sale-count">Chargement...</p></div>
    <button onclick="exportCSV()" style="padding:9px 18px;border-radius:9px;background:rgba(0,212,160,0.08);border:1px solid rgba(0,212,160,0.2);color:var(--success);font-size:0.82rem;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap">Telecharger Excel</button>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Rechercher par n° reçu ou client..." oninput="filterSales()"/>
    </div>
    <select class="filter-select" id="period-filter" onchange="filterSales()">
      <option value="all">Toutes les ventes</option>
      <option value="today">Aujourd'hui</option>
      <option value="week">Cette semaine</option>
      <option value="month">Ce mois</option>
    </select>
    <select class="filter-select" id="method-filter" onchange="filterSales()">
      <option value="">Tous les paiements</option>
      <option value="cash">💵 Espèces</option>
      <option value="card">💳 Carte</option>
    </select>
  </div>
  <div class="table-wrap">
    <div class="table-header">
      <span>N° Reçu</span>
      <span>Date & heure</span>
      <span>Client</span>
      <span>Montant</span>
      <span>Paiement</span>
      <span>Action</span>
    </div>
    <div id="sales-list"><div style="text-align:center;padding:3rem;color:var(--text-muted)">Chargement...</div></div>
  </div>
</main>

<!-- TICKET MODAL -->
<div class="overlay" id="ticket-modal">
  <div>
    <div class="ticket" id="ticket-content">
      <!-- Ticket généré dynamiquement -->
    </div>
    <div class="ticket-actions">
      <button class="btn-print" onclick="printTicket()">🖨️ Imprimer</button>
      <button class="btn-close-ticket" onclick="closeTicket()">Fermer</button>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allSales=[], storeId=null, userId=null, devise='MAD', storeName='Neexup', storeCity='';

  async function init() {
    const {data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='login.html';return;}
    const profileRes2 = await sb.from('profiles').select('role').eq('id', session.user.id).single();
    const userRole2 = profileRes2.data?.role || 'vendeur';
    if (!["admin", "manager"].includes(userRole2)) { window.location.href = 'caisse.html'; return; }

    userId=session.user.id;
    devise=getDevise(session.user.user_metadata);
    storeName=session.user.user_metadata?.store_name||'Neexup';
    storeCity=session.user.user_metadata?.city||'';
    const name=session.user.user_metadata?.full_name||session.user.email.split('@')[0];
    document.getElementById('user-av').textContent=name.slice(0,2).toUpperCase();
    document.getElementById('user-name').textContent=name;
    const profileData=await ensureProfile(sb,userId,session.user.user_metadata);
    storeId=profileData?.store_id;
    await loadSales();
  }

  async function loadSales() {
    const {data:orders}=await sb.from('orders').select('*, order_items(quantity,unit_price,products(name)), receipts(receipt_number), payment_methods(method,amount_given,change_given)').eq('store_id',storeId).order('created_at',{ascending:false}).limit(500);
    allSales=orders||[];
    const countText = allSales.length === 500 ? '500+ ventes (les 500 dernières)' : allSales.length + ' vente(s) au total';
    document.getElementById('sale-count').textContent=countText;
    renderSales(allSales);
  }

  function renderSales(sales) {
    const list=document.getElementById('sales-list');
    if(!sales.length){list.innerHTML='<div style="text-align:center;padding:3rem;color:var(--text-muted)">Aucune vente trouvée</div>';return;}
    list.innerHTML=sales.map(o=>{
      const receipt=o.receipts?.[0]?.receipt_number||'—';
      const method=o.payment_methods?.[0]?.method||'cash';
      const methodLabel=method==='cash'?'💵 Espèces':'💳 Carte';
      const date=new Date(o.created_at);
      return `<div class="table-row" onclick="showTicket('${o.id}')">
        <div class="receipt-num">${receipt}</div>
        <div class="sale-date">${date.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}<br><span style="font-size:0.75rem">${date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span></div>
        <div class="sale-client">${o.customer_name||'Client anonyme'}</div>
        <div class="sale-amount">${parseFloat(o.total).toFixed(2)} ${devise}</div>
        <div><span class="pay-badge">${methodLabel}</span></div>
        <div><button class="btn-view" onclick="event.stopPropagation();showTicket('${o.id}')">🧾 Reçu</button></div>
      </div>`;
    }).join('');
  }

  function filterSales() {
    const search=document.getElementById('search').value.toLowerCase();
    const period=document.getElementById('period-filter').value;
    const method=document.getElementById('method-filter').value;
    const now=new Date();
    const filtered=allSales.filter(o=>{
      const receipt=(o.receipts?.[0]?.receipt_number||'').toLowerCase();
      const client=(o.customer_name||'').toLowerCase();
      const matchSearch=!search||receipt.includes(search)||client.includes(search);
      const date=new Date(o.created_at);
      let matchPeriod=true;
      if(period==='today') matchPeriod=date.toDateString()===now.toDateString();
      else if(period==='week'){const w=new Date(now);w.setDate(w.getDate()-7);matchPeriod=date>=w;}
      else if(period==='month'){const m=new Date(now);m.setDate(m.getDate()-30);matchPeriod=date>=m;}
      const oMethod=o.payment_methods?.[0]?.method||'cash';
      const matchMethod=!method||oMethod===method;
      return matchSearch&&matchPeriod&&matchMethod;
    });
    renderSales(filtered);
  }

  async function showTicket(orderId) {
    const order=allSales.find(o=>o.id===orderId);
    if(!order) return;
    const receipt=order.receipts?.[0]?.receipt_number||'—';
    const method=order.payment_methods?.[0]?.method||'cash';
    const amountGiven=parseFloat(order.payment_methods?.[0]?.amount_given||order.total);
    const changeGiven=parseFloat(order.payment_methods?.[0]?.change_given||0);
    const date=new Date(order.created_at);
    const items=order.order_items||[];
    const subtotal=items.reduce((s,i)=>s+i.quantity*parseFloat(i.unit_price),0);

    document.getElementById('ticket-content').innerHTML=`
      <div class="ticket-top">
        <div class="ticket-logo">${storeName}</div>
        <div class="ticket-store">${storeCity}</div>
        <div class="ticket-date">${date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}<br>${date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
        <div class="ticket-receipt">Reçu N° ${receipt}</div>
        ${order.customer_name?`<div style="font-size:0.75rem;color:#555;margin-top:4px">Client : ${order.customer_name}</div>`:''}
      </div>

      <div class="ticket-section">
        <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#888;margin-bottom:8px">Articles</div>
        ${items.map(i=>`
          <div class="ticket-row">
            <span class="item-name">${i.products?.name||'Article'}</span>
            <span class="item-qty">x${i.quantity}</span>
            <span class="item-price">${(i.quantity*parseFloat(i.unit_price)).toFixed(2)} ${devise}</span>
          </div>
          <div style="font-size:0.72rem;color:#888;margin-bottom:6px;padding-left:2px">${parseFloat(i.unit_price).toFixed(2)} ${devise}/u</div>
        `).join('')}
      </div>

      <hr class="ticket-divider"/>

      <div class="ticket-sub-row"><span>Sous-total</span><span>${subtotal.toFixed(2)} ${devise}</span></div>
      <div class="ticket-total-row"><span>TOTAL</span><span>${parseFloat(order.total).toFixed(2)} ${devise}</span></div>

      <hr class="ticket-divider"/>

      <div class="ticket-sub-row"><span>Mode de paiement</span><span>${method==='cash'?'Espèces':'Carte bancaire'}</span></div>
      ${method==='cash'?`
        <div class="ticket-sub-row"><span>Remis</span><span>${amountGiven.toFixed(2)} ${devise}</span></div>
        <div class="ticket-sub-row"><span>Monnaie rendue</span><span>${changeGiven.toFixed(2)} ${devise}</span></div>
      `:''}

      <div class="ticket-footer">
        <div>★ Merci pour votre achat ! ★</div>
        <div style="margin-top:4px">Conservez ce ticket</div>
        <div style="margin-top:8px;font-size:0.7rem;color:#aaa">Propulsé par Neexup</div>
      </div>
    `;

    document.getElementById('ticket-modal').classList.add('open');
  }

  function closeTicket(){document.getElementById('ticket-modal').classList.remove('open');}

  function printTicket(){window.print();}

  function exportCSV() {
    if (!allSales || allSales.length === 0) { alert('Aucune vente a exporter.'); return; }
    var rows = [['Date', 'Heure', 'N° Recu', 'Client', 'Articles', 'Mode paiement', 'Total']];
    allSales.forEach(function(o) {
      var dt = new Date(o.created_at);
      var date = dt.toLocaleDateString('fr-FR');
      var heure = dt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      var receipt = (o.receipts && o.receipts[0]) ? o.receipts[0].receipt_number : o.id.slice(0, 8).toUpperCase();
      var client = (o.customer_name || '').replace(/"/g, '""');
      var articles = (o.order_items || []).map(function(it) {
        return it.quantity + 'x ' + (it.products ? it.products.name : '?');
      }).join(' | ').replace(/"/g, '""');
      var method = (o.payment_method || 'especes').replace(/"/g, '""');
      var total = Number(o.total || 0).toFixed(2).replace('.', ',');
      rows.push([date, heure, receipt, '"' + client + '"', '"' + articles + '"', method, total]);
    });
    var csv = rows.map(function(r) { return r.join(';'); }).join('\r\n');
    var bom = '﻿';
    var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var dateStr = new Date().toISOString().split('T')[0];
    a.href = url; a.download = 'neexup_ventes_' + dateStr + '.csv';
    a.click(); URL.revokeObjectURL(url);
  }

  async function logout(){await sb.auth.signOut();window.location.href='login.html';}

  var _t=localStorage.getItem('neexup_theme')||'dark';if(_t==='light')document.body.classList.add('light-theme');
  init();
</script>
</body>
</html>
