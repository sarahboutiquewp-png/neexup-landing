<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page introuvable — Neexup</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060910; --bg2: #0a0e1a;
      --border: rgba(255,255,255,0.07);
      --blue: #0066ff; --cyan: #00d4ff;
      --text: #eef2ff; --text-muted: #7a8399;
      --orange: #ff6b35;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 1rem 6%; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; background: linear-gradient(90deg, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-cta { background: var(--orange); color: white; padding: 9px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; text-decoration: none; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 6%; text-align: center; }
    .err-code { font-size: clamp(6rem, 20vw, 10rem); font-weight: 900; letter-spacing: -0.06em; background: linear-gradient(135deg, var(--blue), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 1rem; }
    h1 { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 800; margin-bottom: 1rem; }
    p { color: var(--text-muted); max-width: 400px; margin: 0 auto 2rem; line-height: 1.6; }
    .btn-home { background: var(--orange); color: white; padding: 14px 32px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; text-decoration: none; display: inline-block; margin-right: 1rem; }
    .btn-login { background: transparent; color: var(--cyan); border: 1px solid rgba(0,212,255,0.3); padding: 13px 28px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; text-decoration: none; display: inline-block; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 1.5rem 6%; text-align: center; color: var(--text-muted); font-size: 0.82rem; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Neexup</a>
  <a href="login.html#register" class="nav-cta" data-cta="404_nav">Essayer gratuitement</a>
</nav>
<main>
  <div>
    <div class="err-code">404</div>
    <h1>Cette page n'existe pas</h1>
    <p>Le lien est peut-etre incorrect ou la page a ete deplacee. Retournez a l'accueil ou connectez-vous a votre espace.</p>
    <div class="links">
      <a href="index.html" class="btn-home">Retour a l'accueil</a>
      <a href="login.html" class="btn-login" data-cta="404_login">Se connecter</a>
    </div>
  </div>
</main>
<footer>© 2026 Neexup</footer>
</body>
</html>
