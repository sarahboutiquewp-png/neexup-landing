<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neexup - Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="nav.js" defer></script>
  <script src="support-widget.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060910; --bg2: #0a0e1a; --bg3: #0f1525;
      --border: rgba(255,255,255,0.07);
      --blue: #0066ff; --cyan: #00d4ff;
      --blue-dim: rgba(0,102,255,0.12);
      --text: #eef2ff; --text-muted: #7a8399; --text-dim: #3d4560;
      --success: #00d4a0; --warning: #f59e0b; --danger: #ff4d6a;
      --sidebar: 240px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; }

    .sidebar {
      width: var(--sidebar); flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 1.5rem 1rem; height: 100vh; position: fixed; left: 0; top: 0; z-index: 50;
    }
    .sidebar-logo {
      font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(90deg, #fff 0%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      padding: 0.5rem 0.75rem; margin-bottom: 2rem; text-decoration: none; display: block;
    }
    .nav-section { margin-bottom: 1.5rem; }
    .nav-label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; padding: 0 0.75rem; margin-bottom: 0.5rem; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      color: var(--text-muted); text-decoration: none;
      font-size: 0.875rem; font-weight: 500;
      transition: all 0.2s; cursor: pointer; border: none; background: none;
      width: 100%; text-align: left; font-family: 'Inter', sans-serif;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: var(--blue-dim); color: #3385ff; }
    .nav-item .icon { width: 18px; text-align: center; font-size: 1rem; flex-shrink: 0; }

    .sidebar-bottom { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; }
    .user-av { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--cyan)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: white; flex-shrink: 0; }
    .user-name { font-size: 0.85rem; font-weight: 600; }
    .user-role { font-size: 0.72rem; color: var(--text-muted); }
    .btn-logout { width: 100%; margin-top: 0.5rem; padding: 9px; border-radius: 9px; background: rgba(255,77,106,0.08); border: 1px solid rgba(255,77,106,0.15); color: var(--danger); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }

    .main { margin-left: var(--sidebar); flex: 1; height: 100vh; overflow-y: auto; padding: 2rem 2.5rem; }

    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .topbar h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .topbar p { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
    .btn-new {
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: white; border: none; padding: 10px 20px; border-radius: 10px;
      font-size: 0.875rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
    }

    /* TICKETS LIST */
    .tickets-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .ticket-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .ticket-row:last-child { border-bottom: none; }
    .ticket-row:hover { background: var(--bg3); }
    .ticket-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .ticket-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .ticket-subject { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
    .ticket-meta { font-size: 0.72rem; color: var(--text-muted); }
    .ticket-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .status-badge { font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 6px; border: 1px solid; }
    .status-open { color: var(--danger); border-color: var(--danger); background: rgba(255,77,106,0.08); }
    .status-in_progress { color: var(--warning); border-color: var(--warning); background: rgba(245,158,11,0.08); }
    .status-closed { color: var(--success); border-color: var(--success); background: rgba(0,212,160,0.08); }
    .chevron { color: var(--text-dim); font-size: 0.8rem; }

    /* DETAIL MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 540px; margin: 1rem; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; }
    .modal-title { font-size: 1rem; font-weight: 800; line-height: 1.3; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; padding: 0 4px; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .detail-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .detail-chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 0.75rem; }
    .detail-chip span { color: var(--text-dim); font-size: 0.68rem; display: block; margin-bottom: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .modal-desc-label { font-size: 0.72rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .modal-desc { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; white-space: pre-wrap; }
    .modal-footer { margin-top: 1.25rem; text-align: right; }
    .btn-close-modal { padding: 9px 20px; border-radius: 9px; background: var(--bg3); border: 1px solid var(--border); color: var(--text-muted); font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .empty-sub { font-size: 0.82rem; color: var(--text-muted); }
  </style>
</head>
<body>

<div class="sidebar" id="app-sidebar"></div>

<main class="main">
  <div class="topbar">
    <div>
      <h1>Support</h1>
      <p>Vos demandes d'aide et leur avancement</p>
    </div>
    <button class="btn-new" onclick="document.getElementById('nx-support-btn').click()">+ Nouveau ticket</button>
  </div>

  <div id="tickets-container">
    <div style="text-align:center;padding:3rem;color:var(--text-muted)">Chargement...</div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-subject"></div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="detail-row">
      <div class="detail-chip"><span>Statut</span><span id="modal-status"></span></div>
      <div class="detail-chip"><span>Type</span><span id="modal-type"></span></div>
      <div class="detail-chip"><span>Priorite</span><span id="modal-priority"></span></div>
      <div class="detail-chip"><span>Date</span><span id="modal-date"></span></div>
    </div>
    <div class="modal-desc-label">Description</div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-footer">
      <button class="btn-close-modal" onclick="closeModal()">Fermer</button>
    </div>
  </div>
</div>

<script>
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    var res = await sb.auth.getSession();
    if (!res.data.session) { window.location.href = 'login.html'; return; }
    var meta = res.data.session.user.user_metadata || {};
    var name = meta.full_name || res.data.session.user.email.split('@')[0];
    var _uav = document.getElementById('user-av'); if (_uav) _uav.textContent = name.slice(0, 2).toUpperCase();
    var _unm = document.getElementById('user-name'); if (_unm) _unm.textContent = name;
    var _url = document.getElementById('user-role'); if (_url) _url.textContent = res.data.session.user.email;
    loadTickets();
  }

  async function loadTickets() {
    var container = document.getElementById('tickets-container');
    var res = await sb.from('support_tickets').select('*').order('created_at', { ascending: false }).limit(50);
    var tickets = res.data || [];

    if (!tickets.length) {
      container.innerHTML =
        '<div class="tickets-wrap"><div class="empty-state">' +
        '<div class="empty-icon">🎉</div>' +
        '<div class="empty-title">Aucun ticket pour le moment</div>' +
        '<div class="empty-sub">Tout va bien ! Si vous avez un probleme, cliquez sur "+ Nouveau ticket".</div>' +
        '</div></div>';
      return;
    }

    var icons = { bug: '🐛', question: '❓', feature: '💡', autre: '📝' };
    var statusLabel = { open: 'Ouvert', in_progress: 'En cours', closed: 'Ferme' };
    var typeLabel = { bug: 'Bug', question: 'Question', feature: 'Suggestion', autre: 'Autre' };
    var prioLabel = { low: 'Basse', normal: 'Normale', high: 'Urgente' };

    var rows = tickets.map(function(t) {
      var ic = icons[t.ticket_type] || '📝';
      var sl = statusLabel[t.status] || t.status;
      var sc = 'status-' + (t.status || 'open');
      var d = new Date(t.created_at).toLocaleDateString('fr-FR');
      var dataJson = encodeURIComponent(JSON.stringify(t));
      return '<div class="ticket-row" onclick="openModal(' + dataJson + ')">' +
        '<div class="ticket-left">' +
          '<div class="ticket-icon">' + ic + '</div>' +
          '<div>' +
            '<div class="ticket-subject">' + escHtml(t.subject || '') + '</div>' +
            '<div class="ticket-meta">' + (typeLabel[t.ticket_type] || '') + ' &bull; ' + d + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="ticket-right">' +
          '<span class="status-badge ' + sc + '">' + sl + '</span>' +
          '<span class="chevron">&#8250;</span>' +
        '</div>' +
      '</div>';
    }).join('');

    container.innerHTML = '<div class="tickets-wrap">' + rows + '</div>';
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function openModal(dataJson) {
    var t;
    try { t = JSON.parse(decodeURIComponent(dataJson)); } catch(e) { return; }
    var statusLabel = { open: 'Ouvert', in_progress: 'En cours', closed: 'Ferme' };
    var typeLabel = { bug: 'Bug / Erreur', question: 'Question', feature: 'Suggestion', autre: 'Autre' };
    var prioLabel = { low: 'Basse', normal: 'Normale', high: 'Urgente' };
    document.getElementById('modal-subject').textContent = t.subject || '';
    document.getElementById('modal-status').textContent = statusLabel[t.status] || t.status;
    document.getElementById('modal-type').textContent = typeLabel[t.ticket_type] || t.ticket_type;
    document.getElementById('modal-priority').textContent = prioLabel[t.priority] || t.priority;
    document.getElementById('modal-date').textContent = new Date(t.created_at).toLocaleDateString('fr-FR');
    document.getElementById('modal-desc').textContent = t.description || 'Aucune description.';
    document.getElementById('detail-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('detail-modal').classList.remove('open');
  }

  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  window.__logout = async function() { await sb.auth.signOut(); window.location.href = 'login.html'; };

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
