<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neexup — Page introuvable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060910; --bg2: #0a0e1a;
      --blue: #0066ff; --cyan: #00d4ff;
      --text: #eef2ff; --text-muted: #7a8399;
      --border: rgba(255,255,255,0.07);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .logo {
      font-size: 1.5rem; font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(90deg, #fff 0%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: inline-block; margin-bottom: 3rem; text-decoration: none;
    }
    .code {
      font-size: 7rem; font-weight: 900; letter-spacing: -0.05em;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1; margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem; }
    p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 2rem; }
    .btn-home {
      display: inline-block; padding: 14px 32px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: white; border-radius: 12px; text-decoration: none;
      font-size: 0.95rem; font-weight: 700;
      box-shadow: 0 0 30px rgba(0,102,255,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-home:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(0,102,255,0.4); }
    .btn-back {
      display: inline-block; margin-left: 1rem; padding: 14px 24px;
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 12px;
      text-decoration: none; font-size: 0.95rem; font-weight: 600;
      transition: all 0.2s;
    }
    .btn-back:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" class="logo">Neexup</a>
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée. Pas de panique — revenez à l'accueil.</p>
    <a href="index.html" class="btn-home">Retour à l'accueil →</a>
    <a href="javascript:history.back()" class="btn-back">← Retour</a>
  </div>
  <script src="cookies.js" defer></script>
</body>
</html>
