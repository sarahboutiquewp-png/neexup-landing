<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neexup — Remises</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060910; --bg2: #0a0e1a; --bg3: #0f1525;
      --border: rgba(255,255,255,0.07);
      --blue: #0066ff; --cyan: #00d4ff;
      --blue-dim: rgba(0,102,255,0.12); --glow-blue: rgba(0,102,255,0.25);
      --text: #eef2ff; --text-muted: #7a8399; --text-dim: #3d4560;
      --success: #00d4a0; --warning: #f59e0b; --danger: #ff4d6a;
      --sidebar: 240px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; }
    .sidebar { width: var(--sidebar); flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 1rem; height: 100vh; position: fixed; left: 0; top: 0; z-index: 50; overflow: hidden; }
    .sidebar-logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; background: linear-gradient(90deg, #fff 0%, var(--cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 0.5rem 0.75rem; margin-bottom: 2rem; text-decoration: none; display: block; white-space: nowrap; }
    .nav-section { margin-bottom: 1.5rem; }
    .nav-label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; padding: 0 0.75rem; margin-bottom: 0.5rem; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: 'Inter', sans-serif; white-space: nowrap; overflow: hidden; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: var(--blue-dim); color: #3385ff; }
    .nav-item .icon { width: 18px; text-align: center; font-size: 1rem; flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; overflow: hidden; }
    .user-av { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--cyan)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: white; flex-shrink: 0; }
    .user-name { font-size: 0.85rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-role { font-size: 0.72rem; color: var(--text-muted); }
    .btn-logout { width: 100%; margin-top: 0.5rem; padding: 9px; border-radius: 9px; background: rgba(255,77,106,0.08); border: 1px solid rgba(255,77,106,0.15); color: var(--danger); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .main { margin-left: var(--sidebar); flex: 1; height: 100vh; overflow-y: auto; padding: 2rem 2.5rem; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .topbar h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .topbar p { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
    .btn-add { background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 0.875rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; box-shadow: 0 0 20px var(--glow-blue); }
    .btn-add:hover { transform: translateY(-1px); }
    .remises-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 1rem; }
    .remise-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; transition: all 0.2s; position: relative; overflow: hidden; }
    .remise-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .remise-card.pct::before { background: linear-gradient(90deg, var(--blue), var(--cyan)); }
    .remise-card.fixed::before { background: linear-gradient(90deg, var(--warning), #f97316); }
    .remise-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .remise-card.inactive { opacity: 0.5; }
    .remise-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
    .remise-name { font-size: 1rem; font-weight: 700; }
    .remise-type { font-size: 0.72rem; font-weight: 600; padding: 3px 9px; border-radius: 5px; }
    .type-pct { background: var(--blue-dim); color: #3385ff; }
    .type-fixed { background: rgba(245,158,11,0.1); color: var(--warning); }
    .remise-value { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 0.25rem; }
    .remise-value.pct { background: linear-gradient(135deg, var(--blue), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .remise-value.fixed { color: var(--warning); }
    .remise-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; }
    .remise-footer { display: flex; align-items: center; justify-content: space-between; }
    .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-muted); }
    .toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border); cursor: pointer; position: relative; transition: all 0.2s; }
    .toggle.on { background: var(--blue); border-color: var(--blue); }
    .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: all 0.2s; }
    .toggle.on::after { left: 18px; }
    .remise-actions { display: flex; gap: 0.5rem; }
    .btn-icon { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .btn-icon:hover { background: var(--bg3); color: var(--text); }
    .btn-icon.danger:hover { background: rgba(255,77,106,0.1); color: var(--danger); border-color: rgba(255,77,106,0.2); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); grid-column: 1/-1; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 440px; }
    .modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .modal-title { font-size: 1.2rem; font-weight: 800; }
    .btn-close-m { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
    .field input, .field select { width: 100%; padding: 11px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.875rem; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; }
    .field input:focus, .field select:focus { border-color: var(--blue); }
    .field input::placeholder { color: var(--text-dim); }
    .type-selector { display: flex; gap: 0.75rem; }
    .type-opt { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-align: center; transition: all 0.2s; }
    .type-opt.selected { border-color: var(--blue); background: var(--blue-dim); color: #3385ff; }
    .msg { border-radius: 10px; padding: 10px 14px; font-size: 0.82rem; margin-bottom: 1rem; display: none; }
    .msg-error { background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.2); color: var(--danger); }
    .msg-success { background: rgba(0,212,160,0.1); border: 1px solid rgba(0,212,160,0.2); color: var(--success); }
    .modal-footer { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn-cancel { flex: 1; padding: 12px; border-radius: 10px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-save { flex: 2; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: white; border: none; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; box-shadow: 0 0 20px var(--glow-blue); }
  </style>
</head>
<body>
<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">Neexup</a>
  <div class="nav-section">
    <div class="nav-label">Principal</div>
    <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a class="nav-item" href="caisse.html"><span class="icon">🛒</span> Caisse</a>
    <a class="nav-item" href="products.html"><span class="icon">📦</span> Produits</a>
    <a class="nav-item" href="categories.html"><span class="icon">🏷️</span> Categories</a>
    <a class="nav-item" href="stocks.html"><span class="icon">🏪</span> Stocks</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Gestion</div>
    <a class="nav-item" href="historique.html"><span class="icon">🧾</span> Historique</a>
    <a class="nav-item" href="rapports.html"><span class="icon">📈</span> Rapports</a>
    <a class="nav-item active" href="remises.html"><span class="icon">💰</span> Remises</a>
    <a class="nav-item" href="employes.html"><span class="icon">👥</span> Employes</a>
    <a class="nav-item" href="boutiques.html"><span class="icon">🏬</span> Boutiques</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Compte</div>
    <a class="nav-item" href="parrainage.html"><span class="icon">🎁</span> Parrainage</a>
    <a class="nav-item" href="settings.html"><span class="icon">⚙️</span> Parametres</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-av" id="user-av">?</div>
      <div style="min-width:0"><div class="user-name" id="user-name">...</div><div class="user-role">Admin</div></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Deconnexion</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <h1>Remises</h1>
      <p id="remise-count">Chargement...</p>
    </div>
    <button class="btn-add" onclick="openModal()">+ Creer une remise</button>
  </div>
  <div class="remises-grid" id="remises-grid">
    <div style="text-align:center;padding:3rem;color:var(--text-muted)">Chargement...</div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-title" id="modal-title">Creer une remise</div>
      <button class="btn-close-m" onclick="closeModal()">X</button>
    </div>
    <div class="msg msg-error" id="m-error"></div>
    <div class="msg msg-success" id="m-success"></div>
    <input type="hidden" id="edit-id"/>
    <div class="field">
      <label>Nom de la remise</label>
      <input type="text" id="inp-name" placeholder="Ex: Fidelite, Promo ete, Employe..."/>
    </div>
    <div class="field">
      <label>Type de remise</label>
      <div class="type-selector">
        <button class="type-opt selected" id="opt-pct" onclick="pickType('pct')">% Pourcentage</button>
        <button class="type-opt" id="opt-fixed" onclick="pickType('fixed')">Montant fixe</button>
      </div>
      <input type="hidden" id="inp-type" value="pct"/>
    </div>
    <div class="field">
      <label id="val-label">Valeur (%)</label>
      <input type="number" id="inp-value" placeholder="10" min="0" max="100"/>
    </div>
    <div class="field">
      <label>Description (optionnel)</label>
      <input type="text" id="inp-desc" placeholder="Ex: Pour les clients fidelises"/>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="btn-save" onclick="saveRemise()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
var SB_URL = 'https://xcawbucpypkhdqdyvjpt.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjYXdidWNweXBraGRxZHl2anB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzI4MjEsImV4cCI6MjA5NzEwODgyMX0.jdPDV380N6evZYTmg2zeC7XoYKVnCKSpMAyhMepmfYg';
var sb = supabase.createClient(SB_URL, SB_KEY);
var storeId = null, userId = null, devise = 'MAD';
var selectedType = 'pct';
var allRemises = [];

async function init() {
  var res = await sb.auth.getSession();
  var session = res.data.session;
  if (!session) { window.location.href = 'login.html'; return; }
  userId = session.user.id;
  devise = session.user.user_metadata && session.user.user_metadata.devise ? session.user.user_metadata.devise : 'MAD';
  var name = session.user.user_metadata && session.user.user_metadata.full_name ? session.user.user_metadata.full_name : session.user.email.split('@')[0];
  document.getElementById('user-av').textContent = name.slice(0,2).toUpperCase();
  document.getElementById('user-name').textContent = name;
  var pr = await sb.from('profiles').select('store_id').eq('id', userId).single();
  storeId = pr.data ? pr.data.store_id : null;
  loadRemises();
}

async function loadRemises() {
  var res = await sb.from('remises').select('*').eq('store_id', storeId).order('created_at', { ascending: false });
  allRemises = res.data || [];
  document.getElementById('remise-count').textContent = allRemises.length + ' remise(s) configuree(s)';
  renderRemises();
}

function renderRemises() {
  var grid = document.getElementById('remises-grid');
  if (!allRemises.length) {
    grid.innerHTML = '<div class="empty-state"><p style="font-size:2rem;margin-bottom:1rem">💰</p><p style="font-weight:700;color:var(--text);margin-bottom:0.5rem">Aucune remise</p><p>Cliquez sur Creer une remise pour commencer</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < allRemises.length; i++) {
    var r = allRemises[i];
    var isPct = r.type === 'pct';
    var valDisplay = isPct ? r.value + '%' : r.value + ' ' + devise;
    var typeLabel = isPct ? '% Pourcentage' : 'Montant fixe';
    var typeClass = isPct ? 'type-pct' : 'type-fixed';
    var valClass = isPct ? 'pct' : 'fixed';
    var cardClass = isPct ? 'pct' : 'fixed';
    var inactiveClass = r.active ? '' : ' inactive';
    html += '<div class="remise-card ' + cardClass + inactiveClass + '">';
    html += '<div class="remise-header"><div><div class="remise-name">' + r.name + '</div><div class="remise-type ' + typeClass + '">' + typeLabel + '</div></div></div>';
    html += '<div class="remise-value ' + valClass + '">' + valDisplay + '</div>';
    html += '<div class="remise-desc">' + (r.description || 'Aucune description') + '</div>';
    html += '<div class="remise-footer"><div class="toggle-wrap"><div class="toggle ' + (r.active ? 'on' : '') + '" onclick="toggleActive(\'' + r.id + '\', ' + (r.active ? 'false' : 'true') + ')"></div>' + (r.active ? 'Active' : 'Inactive') + '</div>';
    html += '<div class="remise-actions"><button class="btn-icon" onclick="editRemise(\'' + r.id + '\')">✏️</button><button class="btn-icon danger" onclick="deleteRemise(\'' + r.id + '\')">🗑️</button></div></div>';
    html += '</div>';
  }
  grid.innerHTML = html;
}

function pickType(type) {
  selectedType = type;
  document.getElementById('opt-pct').classList.toggle('selected', type === 'pct');
  document.getElementById('opt-fixed').classList.toggle('selected', type === 'fixed');
  document.getElementById('inp-type').value = type;
  document.getElementById('val-label').textContent = type === 'pct' ? 'Valeur (%)' : 'Montant (' + devise + ')';
  document.getElementById('inp-value').placeholder = type === 'pct' ? '10' : '50';
  if (type === 'pct') document.getElementById('inp-value').max = '100';
  else document.getElementById('inp-value').removeAttribute('max');
}

function openModal(reset) {
  if (reset !== false) {
    document.getElementById('modal-title').textContent = 'Creer une remise';
    document.getElementById('edit-id').value = '';
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-value').value = '';
    document.getElementById('inp-desc').value = '';
    pickType('pct');
  }
  document.getElementById('m-error').style.display = 'none';
  document.getElementById('m-success').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function editRemise(id) {
  var r = allRemises.find(function(x) { return x.id === id; });
  if (!r) return;
  document.getElementById('modal-title').textContent = 'Modifier la remise';
  document.getElementById('edit-id').value = r.id;
  document.getElementById('inp-name').value = r.name;
  document.getElementById('inp-value').value = r.value;
  document.getElementById('inp-desc').value = r.description || '';
  pickType(r.type);
  openModal(false);
}

async function saveRemise() {
  var editId = document.getElementById('edit-id').value;
  var name = document.getElementById('inp-name').value.trim();
  var value = parseFloat(document.getElementById('inp-value').value);
  var type = document.getElementById('inp-type').value;
  var desc = document.getElementById('inp-desc').value.trim();
  var errEl = document.getElementById('m-error');
  errEl.style.display = 'none';
  if (!name || isNaN(value) || value <= 0) {
    errEl.textContent = 'Veuillez remplir le nom et la valeur.';
    errEl.style.display = 'block';
    return;
  }
  if (type === 'pct' && value > 100) {
    errEl.textContent = 'Le pourcentage ne peut pas depasser 100%.';
    errEl.style.display = 'block';
    return;
  }
  document.getElementById('btn-save').disabled = true;
  var data = { store_id: storeId, name: name, type: type, value: value, description: desc, active: true };
  if (editId) {
    await sb.from('remises').update(data).eq('id', editId);
  } else {
    await sb.from('remises').insert(data);
  }
  document.getElementById('btn-save').disabled = false;
  closeModal();
  loadRemises();
}

async function toggleActive(id, active) {
  await sb.from('remises').update({ active: active }).eq('id', id);
  loadRemises();
}

async function deleteRemise(id) {
  if (!confirm('Supprimer cette remise ?')) return;
  await sb.from('remises').delete().eq('id', id);
  loadRemises();
}

async function doLogout() { await sb.auth.signOut(); window.location.href = 'login.html'; }
init();
</script>
</body>
</html>
