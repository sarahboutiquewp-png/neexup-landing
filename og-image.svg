<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060910"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spot)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Left accent line -->
  <rect x="0" y="180" width="4" height="270" fill="url(#brand)" rx="2"/>

  <!-- Logo "N" icon -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="url(#brand)"/>
  <text x="116" y="143" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="48" fill="white" text-anchor="middle">N</text>

  <!-- Brand name -->
  <text x="168" y="130" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="36" fill="white" letter-spacing="-1">Neexup</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" letter-spacing="-3" fill="white">Vendez plus.</text>
  <text x="80" y="365" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" letter-spacing="-3">
    <tspan fill="url(#brand)">Gérez moins.</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="26" fill="#7a8399">La caisse intelligente pour les commerçants modernes</text>

  <!-- Divider -->
  <rect x="80" y="468" width="1040" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- 3 features -->
  <text x="80" y="510" font-family="Arial, sans-serif" font-size="22" fill="#00d4a0">✓</text>
  <text x="110" y="510" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Ventes en temps réel</text>

  <text x="380" y="510" font-family="Arial, sans-serif" font-size="22" fill="#00d4a0">✓</text>
  <text x="410" y="510" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Gestion des stocks</text>

  <text x="680" y="510" font-family="Arial, sans-serif" font-size="22" fill="#00d4a0">✓</text>
  <text x="710" y="510" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Rapports automatiques</text>

  <!-- CTA badge -->
  <rect x="80" y="548" width="290" height="46" rx="23" fill="url(#brand)"/>
  <text x="225" y="578" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="20" fill="white" text-anchor="middle">14 jours gratuits →</text>

  <!-- URL -->
  <text x="1120" y="578" font-family="Arial, sans-serif" font-size="20" fill="#3d4560" text-anchor="end">neexup.com</text>
</svg>
