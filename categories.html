<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neexup — Catégories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="utils.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.light-theme {
      --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9;
      --border: rgba(0,0,0,0.08);
      --text: #0f172a; --text-muted: #64748b; --text-dim: #94a3b8;
    }
    :root {
      --bg: #060910; --bg2: #0a0e1a; --bg3: #0f1525;
      --border: rgba(255,255,255,0.07);
      --blue: #0066ff; --cyan: #00d4ff;
      --blue-dim: rgba(0,102,255,0.12); --glow-blue: rgba(0,102,255,0.25);
      --text: #eef2ff; --text-muted: #7a8399; --text-dim: #3d4560;
      --success: #00d4a0; --danger: #ff4d6a;
      --sidebar: 240px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar); flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 1rem; height: 100vh; position: fixed; left: 0; top: 0; z-index: 50; }
    .sidebar-logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; background: linear-gradient(90deg, #fff 0%, var(--cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 0.5rem 0.75rem; margin-bottom: 2rem; text-decoration: none; display: block; }
    .nav-section { margin-bottom: 1.5rem; }
    .nav-label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; padding: 0 0.75rem; margin-bottom: 0.5rem; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: 'Inter', sans-serif; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: var(--blue-dim); color: #3385ff; }
    .nav-item .icon { width: 18px; text-align: center; font-size: 1rem; flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .user-av { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--cyan)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: white; flex-shrink: 0; }
    .user-name { font-size: 0.85rem; font-weight: 600; }
    .user-role { font-size: 0.72rem; color: var(--text-muted); }
    .btn-logout { width: 100%; margin-top: 0.5rem; padding: 9px; border-radius: 9px; background: rgba(255,77,106,0.08); border: 1px solid rgba(255,77,106,0.15); color: var(--danger); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-logout:hover { background: rgba(255,77,106,0.15); }

    /* MAIN */
    .main { margin-left: var(--sidebar); flex: 1; height: 100vh; overflow-y: auto; padding: 2rem 2.5rem; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .topbar h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .topbar p { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
    .btn-add { background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 0.875rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; box-shadow: 0 0 20px var(--glow-blue); display: flex; align-items: center; gap: 6px; }
    .btn-add:hover { transform: translateY(-1px); }

    /* GRID */
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .cat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; align-items: center; gap: 1rem; transition: border-color 0.2s; }
    .cat-card:hover { border-color: rgba(255,255,255,0.12); }
    .cat-color-dot { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; }
    .cat-info { flex: 1; min-width: 0; }
    .cat-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .cat-count { font-size: 0.78rem; color: var(--text-muted); }
    .cat-actions { display: flex; gap: 0.5rem; }
    .btn-icon { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .btn-icon:hover { background: var(--bg3); color: var(--text); }
    .btn-icon.danger:hover { background: rgba(255,77,106,0.1); color: var(--danger); border-color: rgba(255,77,106,0.2); }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 420px; }
    .modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .modal-title { font-size: 1.2rem; font-weight: 800; }
    .btn-close { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .btn-close:hover { background: var(--bg3); }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
    .field input { width: 100%; padding: 11px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.875rem; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; }
    .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,102,255,0.1); }

    /* COLOR PICKER */
    .color-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.5rem; }
    .color-opt { width: 36px; height: 36px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .color-opt.selected { border-color: white; transform: scale(1.15); }
    .color-opt:hover { transform: scale(1.1); }

    .alert { border-radius: 10px; padding: 10px 14px; font-size: 0.82rem; margin-bottom: 1rem; display: none; }
    .alert-error { background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.2); color: var(--danger); }
    .alert-success { background: rgba(0,212,160,0.1); border: 1px solid rgba(0,212,160,0.2); color: var(--success); }

    .modal-footer { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn-cancel { flex: 1; padding: 12px; border-radius: 10px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-cancel:hover { background: var(--bg3); }
    .btn-save { flex: 2; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: white; border: none; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; box-shadow: 0 0 20px var(--glow-blue); }
    .btn-save:hover { transform: translateY(-1px); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  </style>

<body>

<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">Neexup</a>
  <div class="nav-section">
    <div class="nav-label">Principal</div>
    <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a class="nav-item" href="caisse.html"><span class="icon">🛒</span> Caisse</a>
    <a class="nav-item" href="products.html"><span class="icon">📦</span> Produits</a>
    <a class="nav-item active" href="categories.html"><span class="icon">🏷️</span> Catégories</a>
    <a class="nav-item" href="stocks.html"><span class="icon">🏪</span> Stocks</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Gestion</div>
    <a class="nav-item" href="historique.html"><span class="icon">🧾</span> Historique</a>
    <a class="nav-item" href="remises.html"><span class="icon">💰</span> Remises</a>
    <a class="nav-item" href="rapports.html"><span class="icon">📈</span> Rapports</a>
    <a class="nav-item" href="employes.html"><span class="icon">👥</span> Employés</a>
    <a class="nav-item" href="boutiques.html"><span class="icon">🏬</span> Boutiques</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Compte</div>
    <a class="nav-item" href="settings.html"><span class="icon">⚙️</span> Paramètres</a>
  </div>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-av" id="user-av">?</div>
      <div>
        <div class="user-name" id="user-name">Chargement...</div>
        <div class="user-role">Admin</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <h1>Catégories</h1>
      <p id="cat-count">Chargement...</p>
    </div>
    <button class="btn-add" onclick="openModal()">➕ Ajouter une catégorie</button>
  </div>
  <div class="cat-grid" id="cat-grid">
    <div class="empty-state"><h3>Chargement...</h3></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-title" id="modal-title">Ajouter une catégorie</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="alert alert-error" id="modal-error"></div>
    <div class="alert alert-success" id="modal-success"></div>
    <input type="hidden" id="edit-id"/>
    <div class="field">
      <label>Nom de la catégorie *</label>
      <input type="text" id="cat-name" placeholder="Ex: Boissons, Vêtements..."/>
    </div>
    <div class="field">
      <label>Couleur</label>
      <div class="color-grid" id="color-grid"></div>
      <input type="hidden" id="cat-color" value="#0066ff"/>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="btn-save" onclick="saveCategory()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://xcawbucpypkhdqdyvjpt.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjYXdidWNweXBraGRxZHl2anB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzI4MjEsImV4cCI6MjA5NzEwODgyMX0.jdPDV380N6evZYTmg2zeC7XoYKVnCKSpMAyhMepmfYg'
  );

  const COLORS = [
    '#0066ff','#00d4ff','#7c3aed','#ec4899','#f59e0b',
    '#10b981','#ef4444','#f97316','#06b6d4','#84cc16',
    '#6366f1','#14b8a6','#e11d48','#8b5cf6','#0ea5e9',
    '#d97706','#16a34a','#dc2626','#7c3aed','#0284c7'
  ];

  let storeId = null, userId = null, selectedColor = '#0066ff';

  function buildColorGrid() {
    const grid = document.getElementById('color-grid');
    grid.innerHTML = COLORS.map((c, i) => `
      <div class="color-opt ${i === 0 ? 'selected' : ''}"
        style="background:${c}"
        onclick="selectColor(this, '${c}')">
      </div>`).join('');
  }

  function selectColor(el, color) {
    document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedColor = color;
    document.getElementById('cat-color').value = color;
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    // Role guard
    const userRole = session.user.user_metadata?.role || '';
    const profileRes = await sb.from('profiles').select('role').eq('id', session.user.id).single();
    const role = profileRes.data?.role || userRole || 'vendeur';
    const allowedRoles = ["admin", "manager"];
    if (!allowedRoles.includes(role)) {
      window.location.href = 'caisse.html'; return;
    }

    userId = session.user.id;
    const name = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
    document.getElementById('user-av').textContent = name.slice(0,2).toUpperCase();
    document.getElementById('user-name').textContent = name;
    const { data: profile } = await sb.from('profiles').select('store_id').eq('id', userId).single();
    storeId = profile?.store_id;
    buildColorGrid();
    await loadCategories();
  }

  async function loadCategories() {
    const { data: cats } = await sb.from('categories').select('*').eq('store_id', storeId).order('name');
    const { data: prods } = await sb.from('products').select('category_id').eq('store_id', storeId);
    document.getElementById('cat-count').textContent = `${(cats||[]).length} catégorie(s)`;
    const grid = document.getElementById('cat-grid');
    if (!cats || !cats.length) {
      grid.innerHTML = `<div class="empty-state"><h3>Aucune catégorie</h3><p>Cliquez sur "Ajouter une catégorie" pour commencer</p></div>`;
      return;
    }
    grid.innerHTML = cats.map(c => {
      const count = (prods||[]).filter(p => p.category_id === c.id).length;
      return `
        <div class="cat-card">
          <div class="cat-color-dot" style="background:${c.color || '#0066ff'}"></div>
          <div class="cat-info">
            <div class="cat-name">${c.name}</div>
            <div class="cat-count">${count} produit(s)</div>
          </div>
          <div class="cat-actions">
            <button class="btn-icon" onclick="editCat('${c.id}','${c.name}','${c.color || '#0066ff'}')">✏️</button>
            <button class="btn-icon danger" onclick="deleteCat('${c.id}', ${count})">🗑️</button>
          </div>
        </div>`;
    }).join('');
  }

  function openModal(reset = true) {
    if (reset) {
      document.getElementById('modal-title').textContent = 'Ajouter une catégorie';
      document.getElementById('edit-id').value = '';
      document.getElementById('cat-name').value = '';
      document.getElementById('modal-error').style.display = 'none';
      document.getElementById('modal-success').style.display = 'none';
      buildColorGrid();
      selectedColor = '#0066ff';
    }
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  function editCat(id, name, color) {
    document.getElementById('modal-title').textContent = 'Modifier la catégorie';
    document.getElementById('edit-id').value = id;
    document.getElementById('cat-name').value = name;
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('modal-success').style.display = 'none';
    buildColorGrid();
    selectedColor = color;
    document.getElementById('cat-color').value = color;
    // Select matching color
    document.querySelectorAll('.color-opt').forEach(el => {
      if (el.style.background === color || el.style.backgroundColor === color) el.classList.add('selected');
      else el.classList.remove('selected');
    });
    openModal(false);
  }

  async function saveCategory() {
    const name = document.getElementById('cat-name').value.trim();
    const color = document.getElementById('cat-color').value || '#0066ff';
    const editId = document.getElementById('edit-id').value;
    const errEl = document.getElementById('modal-error');
    const sucEl = document.getElementById('modal-success');
    errEl.style.display = 'none'; sucEl.style.display = 'none';

    if (!name) { errEl.textContent = 'Veuillez entrer un nom.'; errEl.style.display = 'block'; return; }

    document.getElementById('btn-save').disabled = true;

    if (editId) {
      await sb.from('categories').update({ name, color }).eq('id', editId);
    } else {
      await sb.from('categories').insert({ store_id: storeId, name, color });
    }

    sucEl.textContent = editId ? '✅ Catégorie modifiée !' : '✅ Catégorie ajoutée !';
    sucEl.style.display = 'block';
    document.getElementById('btn-save').disabled = false;
    setTimeout(async () => { closeModal(); await loadCategories(); }, 800);
  }

  async function deleteCat(id, count) {
    if (count > 0) {
      if (!confirm(`Cette catégorie contient ${count} produit(s). Les produits ne seront pas supprimés mais perdront leur catégorie. Continuer ?`)) return;
    } else {
      if (!confirm('Supprimer cette catégorie ?')) return;
    }
    await sb.from('categories').delete().eq('id', id);
    await loadCategories();
  }

  async function logout() { await sb.auth.signOut(); window.location.href = 'login.html'; }

  var _t=localStorage.getItem('neexup_theme')||'dark';if(_t==='light')document.body.classList.add('light-theme');
  init();
</script>
</body>
